name: Feature request
description: Suggest an idea for Zarya
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Zarya 0.30 is a public beta feedback milestone. Feature requests are welcome but may be deferred until after beta stabilization.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
