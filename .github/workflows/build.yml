name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --target zarya_lrelease zarya zarya-helper zarya_xray_config_test
      - name: Test
        run: ./build/Release/zarya_xray_config_test.exe
      - name: Package (unsigned)
        run: .\scripts\package-windows.ps1 -Configuration Release -OutputDir dist -SkipBuild -SkipSigning
      - name: Verify release artifact
        run: python scripts/verify-release-artifacts.py --artifact dist/Zarya-0.29.0-beta-windows-x64-portable.zip --expected-version 0.29.0-beta --public-beta --require-checksum --allow-unsigned

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qttools6-dev cmake build-essential
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target zarya zarya_xray_config_test
      - name: Test
        run: ./build/zarya_xray_config_test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: brew install qt@6 cmake
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
      - name: Build
        run: cmake --build build --target zarya zarya_xray_config_test
      - name: Test
        run: ./build/zarya_xray_config_test
