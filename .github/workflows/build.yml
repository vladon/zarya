name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --target zarya_lrelease zarya zarya-helper zarya_xray_config_test
      - name: Test
        run: ./build/Release/zarya_xray_config_test.exe
      - name: Package (unsigned)
        run: .\scripts\package-windows.ps1 -Configuration Release -OutputDir dist -SkipBuild -SkipSigning
      - name: Verify release artifact
        run: python scripts/verify-release-artifacts.py --artifact dist/Zarya-1.0.0-windows-x64-portable.zip --expected-version 1.0.0 --stable-release --require-checksum --allow-unsigned

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev cmake build-essential xvfb
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target zarya zarya_xray_config_test
      - name: Test
        run: ./build/zarya_xray_config_test
      - name: Package (unsigned)
        if: github.ref == 'refs/heads/main'
        run: ./scripts/package-linux.sh --skip-build --skip-signing
      - name: Verify release artifact
        if: github.ref == 'refs/heads/main'
        run: python3 scripts/verify-release-artifacts.py --artifact dist/Zarya-1.0.0-linux-x64.tar.gz --expected-version 1.0.0 --stable-release --require-checksum --allow-unsigned
      - name: Upload release artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: zarya-linux-x64
          path: dist/Zarya-1.0.0-linux-x64.*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: brew install qt@6 cmake
      - name: Check translations
        run: python scripts/check-translations.py
      - name: Configure
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"
      - name: Build
        run: cmake --build build --target zarya zarya_xray_config_test
      - name: Test
        run: ./build/zarya_xray_config_test
      - name: Package (unsigned)
        if: github.ref == 'refs/heads/main'
        run: ./scripts/package-macos.sh --skip-build --skip-signing
      - name: Verify release artifact
        if: github.ref == 'refs/heads/main'
        run: python3 scripts/verify-release-artifacts.py --artifact dist/Zarya-1.0.0-macos-arm64.zip --expected-version 1.0.0 --stable-release --require-checksum --allow-unsigned
      - name: Upload release artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: zarya-macos-arm64
          path: dist/Zarya-1.0.0-macos-arm64.*
          if-no-files-found: error
